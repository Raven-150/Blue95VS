---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: blue95
description: A desktop for your childhood home's computer room

base-image: ghcr.io/winblues/vauxite
image-version: 43

modules:
  - type: bling
    install:
      - 1password

  - type: dnf
    repos:
      nonfree: negativo17
    install:
      packages:
      # Gaming Related Packages
      - steam
      - lutris
      # Programing Related Packages
      - https://github.com/VSCodium/vscodium/releases/download/1.112.01907/codium-1.112.01907-el8.x86_64.rpm
      - geany
      # Terminal Related Packages
      - htop
      - btop
      - cool-retro-term
      - cmatrix
      - oneko
      - fastfetch
      # Base Program Packages
      - audacious
      - btop
      - catfish
      - edk2-ovmf
      - libvirt
      - libvirt-nss
      - libcanberra-gtk3
      - lightdm-gtk-greeter-settings
      - mate-disk-usage-analyzer
      - mate-system-monitor
      - menulibre
      - neovim
      - vim
      - orage
      - patch
      - podman-compose
      - podman-machine
      - python3-cairosvg
      - plymouth-plugin-script
      - qemu-char-spice
      - qemu-device-display-virtio-gpu
      - qemu-device-display-virtio-vga
      - qemu-device-usb-redirect
      - qemu-img
      - qemu-system-x86-core
      - qemu-user-binfmt
      - qemu-user-static
      - qemu
      - qt5ct
      - qt5-qtstyleplugins
      - script
      - sox
      - strace
      - virt-manager
      - vorbis-tools
      - wine-ms-sans-serif-fonts
      - wine-tahoma-fonts
      - xorg-x11-server-Xephyr # to test lightdm
      - xscreensaver-extras
      - xscreensaver-extras-gss
      # Chicago95 Plus!
      - inkscape
      - xcursorgen
      - python3-svgwrite
      - python3-fonttools
      - python3-numpy
      # Installer packages
      - python3-pillow
      - python3-gobject
      - python3-icoextract
      - python3-pip
      - gtk3
      - kmines
      # Fix taskbar icons for Xfce 4.20
      - gdk-pixbuf2-modules-extra
      # Raw RPMs
      - https://github.com/felixrieseberg/clippy/releases/download/v0.4.3/Clippy-0.4.3-1.x86_64.rpm
      - https://github.com/1j01/jspaint/releases/download/v1.0.0-beta.1/jspaint-1.0.0-Linux-x64.rpm


  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - com.github.k4zmu2a.spacecadetpinball
          - org.gtk.Gtk3theme.Chicago95
          - com.tomjwatson.Emote
          - org.libreoffice.LibreOffice
          - com.discordapp.Discord
          - org.libreoffice.LibreOffice
          - org.mozilla.firefox
          - md.obsidian.Obsidian
          - net.retrodeck.retrodeck
          - com.github.tchx84.Flatseal
          - com.moonlight_stream.Moonlight

  - type: files
    files:
      - source: system
        destination: /

  - type: script
    snippets:
      - 'cd $CONFIG_DIRECTORY/scripts && for script in *.sh; do [ -f "$script" ] && bash "$script"; done'

  # Regenerate initramfs because of plymouth
  - type: initramfs

  - type: signing

